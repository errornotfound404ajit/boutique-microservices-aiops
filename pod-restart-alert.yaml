apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-restart-alerts
  namespace: monitoring

spec:
  groups:
  - name: kubernetes-alerts

    rules:
    - alert: PodRestarting

      expr: increase(kube_pod_container_status_restarts_total[1m]) > 0

      for: 1m

      labels:
        severity: warning

      annotations:
        summary: "Pod restarting detected"
        description: "A pod restarted in the cluster."
